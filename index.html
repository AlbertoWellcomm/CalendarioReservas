<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Reservas</title>
    <!-- Use Google Fonts (from style.css) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDKs (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root {
            --primary: #58a6ff;
            --accent: #a371f7;
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text-color: #e6edf3;
            --radius: 16px;
        }

        body {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #1a1a2e, #0d1117);
            margin: 0;
            font-family: 'Outfit', sans-serif;
            color: var(--text-color);
            overflow: hidden;
        }

        /* Animated background elements for 'Premium' feel */
        body::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: var(--primary);
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
        }

        .portal-container {
            position: relative;
            z-index: 1;
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3.5rem 2.5rem;
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .portal-logo {
            width: 160px;
            height: auto;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }

        .portal-title {
            margin: 0 0 0.5rem;
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .portal-subtitle {
            font-size: 0.95rem;
            color: #8b949e;
            margin-bottom: 2.5rem;
        }

        .portal-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 0.9rem;
            margin-bottom: 0.85rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .portal-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .portal-btn-primary {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            color: #fff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .portal-btn-primary:hover {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.3);
        }

        /* Icon styling */
        .portal-btn span {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <img src="logo.png" alt="Logo Tarragona" class="portal-logo">
        <h1 class="portal-title">Gestión de Reservas</h1>
        <p class="portal-subtitle">Acceso exclusivo para personal autorizado</p>
        
        <button class="portal-btn" onclick="requestPassword('empleados.html')">
            <span>👥</span> Vista Empleados
        </button>
        
        <button class="portal-btn portal-btn-primary" onclick="requestPassword('admin.html')">
            <span>💻</span> Vista Admin PC
        </button>
        
        <button class="portal-btn portal-btn-primary" onclick="requestPassword('tablet.html')">
            <span>📱</span> Vista Tablet
        </button>
    </div>

    <!-- Password Modal -->
    <div id="pwd-modal" class="receipt-modal-overlay hidden">
        <div class="portal-modal-box">
            <h2 style="margin-bottom: 1rem; font-size: 1.3rem;">Acceso Restringido</h2>
            <p style="margin-bottom: 1.5rem; color: #8b949e; font-size: 0.9rem;">Introduce tus credenciales de Firebase para acceder.</p>
            <input type="email" id="email-input" placeholder="Email (ej: admin@calres.com)" class="local-note-input" style="width: 100%; box-sizing: border-box; background: var(--bg); color: white; border: 1px solid var(--border); padding: 10px; border-radius: 4px; margin-bottom: 12px;">
            <input type="password" id="pwd-input" placeholder="Contraseña" class="local-note-input" style="width: 100%; box-sizing: border-box; background: var(--bg); color: white; border: 1px solid var(--border); padding: 10px; border-radius: 4px;">
            <div style="display: flex; gap: 10px; margin-top: 1.5rem;">
                <button id="pwd-submit-btn" class="action-btn" style="flex: 1; background: var(--accent); color: white;">Entrar</button>
                <button id="pwd-close-btn" class="action-btn secondary-btn" style="flex: 1;">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const pwdModal = document.getElementById('pwd-modal');
        const emailInput = document.getElementById('email-input');
        const pwdInput = document.getElementById('pwd-input');
        const pwdSubmitBtn = document.getElementById('pwd-submit-btn');
        const pwdCloseBtn = document.getElementById('pwd-close-btn');
        
        let targetPage = '';

        function requestPassword(pageUrl) {
            // See if they are already authenticated this session
            if (firebase.auth().currentUser) {
                sessionStorage.setItem('auth', 'true');
                window.location.href = pageUrl;
                return;
            }
            
            targetPage = pageUrl;
            emailInput.value = '';
            pwdInput.value = '';
            pwdModal.classList.remove('hidden');
            emailInput.focus();
        }

        async function checkPassword() {
            const email = emailInput.value.trim();
            const password = pwdInput.value;
            
            if (!email || !password) {
                alert('Introduce el email y la contraseña.');
                return;
            }

            try {
                pwdSubmitBtn.textContent = 'Iniciando sesión...';
                pwdSubmitBtn.disabled = true;
                
                await firebase.auth().signInWithEmailAndPassword(email, password);
                
                sessionStorage.setItem('auth', 'true');
                window.location.href = targetPage;
            } catch (err) {
                console.error(err);
                alert('Error al iniciar sesión: ' + err.message);
            } finally {
                pwdSubmitBtn.textContent = 'Entrar';
                pwdSubmitBtn.disabled = false;
            }
        }

        pwdSubmitBtn.addEventListener('click', checkPassword);
        [emailInput, pwdInput].forEach(el => {
            el.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') checkPassword();
            });
        });
        pwdCloseBtn.addEventListener('click', () => {
            pwdModal.classList.add('hidden');
        });

        // Persist session check
        firebase.auth().onAuthStateChanged((user) => {
            if (user) sessionStorage.setItem('auth', 'true');
            else sessionStorage.removeItem('auth');
        });
    </script>
</body>
</html>
